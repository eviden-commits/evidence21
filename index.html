<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>업무창고 — 품질안전보건실</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #F3F4F6; --surface: #FFFFFF; --surface-sub: #F9FAFB; --border: rgba(0, 0, 0, 0.06); --border-strong: rgba(0, 0, 0, 0.12);
            --text-primary: #111827; --text-secondary: #4B5563; --text-tertiary: #9CA3AF; --accent: #1F2937;
            --accent-blue: #2563EB; --accent-blue-light: #EFF6FF; --accent-red: #DC2626; --accent-red-light: #FEF2F2;
            --accent-green: #16A34A; --accent-green-light: #F0FDF4; --accent-amber: #D97706; --accent-amber-light: #FEF3C7;
            --accent-purple: #7C3AED; --accent-purple-light: #F5F3FF; --mono: 'JetBrains Mono', monospace;
            --sans: 'Pretendard', sans-serif; --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text-primary); min-height: 100vh; padding-bottom: 60px; -webkit-font-smoothing: antialiased; letter-spacing: -0.02em; }

        /* LOADING */
        #loading-overlay { display: flex; position: fixed; inset: 0; background: var(--bg); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 20px; transition: opacity 0.3s ease; }
        #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .loader-logo { font-size: 14px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.05em; }
        .loader-bar { width: 160px; height: 3px; background: rgba(0,0,0,0.05); border-radius: 3px; overflow: hidden; }
        .loader-bar::after { content: ''; display: block; height: 100%; width: 40%; background: var(--accent); border-radius: 3px; animation: loader-slide 0.8s ease-in-out infinite alternate; }
        @keyframes loader-slide { from { transform: translateX(-100%); } to { transform: translateX(250%); } }

        /* TOP NAV */
        .top-nav { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); }
        .nav-brand { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 8px 16px; border-radius: 30px; transition: background 0.15s; background: var(--accent); color: white; }
        .nav-brand:hover { background: #000; }
        .nav-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: #60A5FA; }
        .nav-brand-name { font-size: 14px; font-weight: 700; }
        .nav-right { display: flex; align-items: center; gap: 24px; }
        
        .nav-progress-wrap { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); font-weight: 600; }
        .nav-progress-bar-bg { width: 100px; height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden; }
        .nav-progress-bar-fill { height: 100%; width: 0%; background: var(--accent-green); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .nav-task-count { display: flex; align-items: baseline; gap: 6px; }
        .nav-count-num { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text-primary); }
        .nav-count-label { font-size: 12px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; }
        .nav-sync { font-family: var(--mono); font-size: 11px; color: var(--text-tertiary); }
        
        .nav-auth-input-wrapper { display: flex; align-items: center; gap: 8px; background: #E5E7EB; padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; transition: all 0.15s; }
        .nav-auth-input-wrapper:focus-within { background: var(--surface); border-color: var(--text-primary); }
        .nav-auth-input-wrapper i { color: var(--text-secondary); font-size: 13px; }
        .nav-auth-field { border: none; background: transparent; font-size: 13px; width: 100px; outline: none; font-family: var(--mono); color: var(--text-primary); }

        .nav-actions { display: flex; align-items: center; gap: 6px; }
        .nav-btn { width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: var(--text-secondary); font-size: 16px; transition: all 0.15s; }
        .nav-btn:hover { background: #E5E7EB; color: var(--text-primary); }
        .nav-btn.primary { background: var(--accent); color: white; box-shadow: var(--shadow-sm); }
        .nav-btn.primary:hover { background: #000; transform: translateY(-1px); }

        .container { max-width: 1140px; margin: 0 auto; padding: 40px; }
        .section-label-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .section-label { font-size: 18px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .section-label span { font-size: 13px; color: var(--text-tertiary); font-weight: 400; }

        /* 토글 아카이브 버튼 */
        .toggle-archive-btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 30px; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; user-select: none; box-shadow: var(--shadow-sm); }
        .toggle-archive-btn:hover { background: var(--surface-sub); color: var(--text-primary); }
        .toggle-archive-btn.active { background: var(--accent-blue-light); color: var(--accent-blue); border-color: rgba(37, 99, 235, 0.3); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* MEMO CARD */
        .memo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; display: flex; align-items: flex-start; gap: 18px; box-shadow: var(--shadow-md); }
        .memo-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
        .memo-body { flex: 1; min-width: 0; }
        .memo-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .memo-author { font-size: 14px; font-weight: 700; color: var(--text-primary); }
        .memo-role { font-size: 12px; color: var(--text-tertiary); margin-left: 6px; font-weight: 400; }
        .memo-edit-btn { width: 30px; height: 30px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-tertiary); font-size: 13px; transition: all 0.15s; }
        .memo-edit-btn:hover { background: var(--surface-sub); color: var(--text-primary); }
        .memo-text { font-size: 14px; line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap; }

        /* SCHEDULE SECTION */
        .schedule-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .sch-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-sm); transition: all 0.2s ease; }
        .sch-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
        .sch-card.today { background: var(--accent); border-color: var(--accent); color: white; box-shadow: var(--shadow-md); }
        .sch-top { display: flex; align-items: center; justify-content: space-between; }
        .sch-day { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        .sch-card.today .sch-day { color: rgba(255,255,255,0.6); }
        .badge-today { font-size: 10px; font-weight: 700; background: var(--accent-blue-light); color: var(--accent-blue); padding: 2px 8px; border-radius: 20px; }
        .sch-card.today .badge-today { background: white; color: var(--accent); }
        .sch-date { font-family: var(--mono); font-size: 24px; font-weight: 500; margin: 12px 0 4px; color: var(--text-primary); }
        .sch-card.today .sch-date { color: white; }
        .sch-loc { font-size: 13px; font-weight: 500; color: var(--text-secondary); line-height: 1.4; }
        .sch-card.today .sch-loc { color: rgba(255,255,255,0.9); }
        .sch-card.holiday .sch-day, .sch-card.holiday .sch-date, .sch-card.holiday .sch-loc { color: var(--accent-red); }
        .holiday-name { font-size: 11px; color: var(--accent-red); margin-top: 2px; font-weight: 600; }
        .sch-card.today .holiday-name { color: #FFA8A8; }

        /* CATEGORY GRID */
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
        .cat-card::before { content: ''; position: absolute; inset: 0 0 auto 0; height: 4px; opacity: 0.4; transition: opacity 0.2s; }
        .cat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
        .cat-card:hover::before { opacity: 1; }
        .cat-card.selected { border-color: var(--text-primary); box-shadow: 0 0 0 1px var(--text-primary), var(--shadow-md); transform: translateY(-2px); }

        .cat-card[data-cat="사고관리"]::before { background: var(--accent-red); }
        .cat-card[data-cat="사고관리"] .cat-icon-wrap { background: var(--accent-red-light); color: var(--accent-red); }
        .cat-card[data-cat="사고관리"] .cat-badge { background: var(--accent-red-light); color: var(--accent-red); }
        .cat-card[data-cat="입찰지원"]::before { background: var(--accent-blue); }
        .cat-card[data-cat="입찰지원"] .cat-icon-wrap { background: var(--accent-blue-light); color: var(--accent-blue); }
        .cat-card[data-cat="입찰지원"] .cat-badge { background: var(--accent-blue-light); color: var(--accent-blue); }
        .cat-card[data-cat="노무관리"]::before { background: var(--accent-amber); }
        .cat-card[data-cat="노무관리"] .cat-icon-wrap { background: var(--accent-amber-light); color: var(--accent-amber); }
        .cat-card[data-cat="노무관리"] .cat-badge { background: var(--accent-amber-light); color: var(--accent-amber); }
        .cat-card[data-cat="인증관리"]::before { background: var(--accent-green); }
        .cat-card[data-cat="인증관리"] .cat-icon-wrap { background: var(--accent-green-light); color: var(--accent-green); }
        .cat-card[data-cat="인증관리"] .cat-badge { background: var(--accent-green-light); color: var(--accent-green); }
        .cat-card[data-cat="법무관리"]::before { background: var(--accent-purple); }
        .cat-card[data-cat="법무관리"] .cat-icon-wrap { background: var(--accent-purple-light); color: var(--accent-purple); }
        .cat-card[data-cat="법무관리"] .cat-badge { background: var(--accent-purple-light); color: var(--accent-purple); }
        .cat-card[data-cat="기타관리"]::before { background: #4B5563; }
        .cat-card[data-cat="기타관리"] .cat-icon-wrap { background: #F3F4F6; color: #4B5563; }
        .cat-card[data-cat="기타관리"] .cat-badge { background: #F3F4F6; color: #4B5563; }

        .cat-icon-wrap { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 20px; }
        .cat-name { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }
        .cat-footer { display: flex; align-items: center; justify-content: space-between; }
        .cat-status { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
        .cat-badge { font-family: var(--mono); font-size: 14px; font-weight: 600; padding: 2px 10px; border-radius: 20px; }

        /* CONTENT PANEL */
        #content-area { display: none; margin-top: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); }
        .content-header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #FAFAFA; flex-wrap: wrap; gap: 16px; }
        .content-title-wrap { display: flex; align-items: center; gap: 10px; }
        .content-title { font-size: 16px; font-weight: 700; }
        .content-count { font-size: 13px; color: var(--text-tertiary); }
        
        .filter-controls { display: flex; align-items: center; gap: 16px; }
        .search-input-wrapper { position: relative; }
        .search-input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 13px; }
        .search-box { padding: 8px 14px 8px 36px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; outline: none; background: var(--surface); width: 180px; transition: all 0.2s; }
        .search-box:focus { width: 240px; border-color: var(--text-primary); }
        
        #ui-post-list { padding: 8px 32px; }
        .list-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 0; border-bottom: 1px solid var(--border); gap: 16px; }
        .list-row:last-child { border-bottom: none; }
        .list-info { display: flex; flex-direction: column; gap: 6px; min-width: 0; flex: 1; }
        .list-date { font-family: var(--mono); font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
        .list-title { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }
        .list-content { font-size: 14px; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; margin-top: 2px; }
        .list-duedate { font-size: 12px; font-family: var(--mono); color: var(--text-secondary); margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; font-weight: 500; }
        .list-duedate.overdue { color: var(--accent-red); background: var(--accent-red-light); padding: 2px 6px; border-radius: 4px; width: fit-content; }
        .list-attachment { font-size: 13px; margin-top: 6px; display: inline-flex; align-items: center; gap: 6px; color: var(--accent-blue); text-decoration: none; font-weight: 600; }
        .list-attachment:hover { text-decoration: underline; }

        .list-row.done .list-title { text-decoration: line-through; color: var(--text-tertiary); }
        .list-row.done .list-info > *:not(.list-title) { opacity: 0.5; }
        
        .list-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }
        .btn-del, .btn-done, .btn-mod { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--text-tertiary); font-size: 14px; cursor: pointer; transition: all 0.15s; }
        .btn-del:hover { background: var(--accent-red-light); color: var(--accent-red); }
        .btn-done:hover { background: var(--accent-green-light); color: var(--accent-green); }
        .btn-done.active { color: var(--accent-green); background: var(--accent-green-light); }
        .btn-mod:hover { background: var(--accent-blue-light); color: var(--accent-blue); }
        .list-empty { padding: 60px 0; text-align: center; color: var(--text-tertiary); font-size: 14px; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); width: 100%; max-width: 500px; border-radius: var(--radius-md); padding: 32px; box-shadow: var(--shadow-lg); animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
        .field-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }
        .field-wrap { margin-bottom: 20px; }
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--sans); color: var(--text-primary); background: var(--bg); outline: none; transition: all 0.15s; }
        .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus { border-color: var(--text-primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(0,0,0,0.03); }
        .modal-content-file-label { display: block; padding: 14px; border: 1px dashed var(--border-strong); text-align: center; border-radius: var(--radius-sm); background: var(--bg); cursor: pointer; font-size: 13px; color: var(--text-secondary); font-weight: 600; }
        .modal-content-file-label:hover { background: var(--surface-sub); }
        
        .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
        .btn-primary:hover { background: #000; }
        .btn-ghost { width: 100%; padding: 12px; background: none; border: none; font-size: 14px; color: var(--text-tertiary); cursor: pointer; font-weight: 500; }
        .btn-ghost:hover { color: var(--text-primary); }
        .section-gap { margin-bottom: 40px; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader-logo">업무창고 · 품질안전보건실</div>
    <div class="loader-bar"></div>
</div>

<nav class="top-nav">
    <div class="nav-brand" onclick="goHome()" title="메인 대시보드로 이동">
        <div class="nav-brand-dot"></div>
        <span class="nav-brand-name">최차장 업무창고</span>
    </div>
    <div class="nav-right">
        <div class="nav-progress-wrap">
            <span>진척도</span>
            <div class="nav-progress-bar-bg">
                <div class="nav-progress-bar-fill" id="ui-progress-fill"></div>
            </div>
            <span id="ui-progress-percent">0%</span>
        </div>
        <div class="nav-task-count">
            <span class="nav-count-num" id="nav-total">0</span>
            <span class="nav-count-label">Tasks</span>
        </div>
        <span class="nav-sync" id="nav-sync">—</span>
        
        <div class="nav-auth-input-wrapper">
            <i class="fa-solid fa-key"></i>
            <input type="password" id="global-auth-pwd" class="nav-auth-field" placeholder="인증코드">
        </div>

        <div class="nav-actions">
            <button class="nav-btn" onclick="syncForce()" title="강제 동기화(캐시 갱신)">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
            <button class="nav-btn primary" onclick="openModal()" title="새 업무 추가">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="section-gap">
        <div class="section-label">중요 코멘트</div>
        <div class="memo-card">
            <div class="memo-avatar">정</div>
            <div class="memo-body">
                <div class="memo-meta">
                    <div>
                        <span class="memo-author">정재빈 실장</span>
                        <span class="memo-role">품질안전보건실</span>
                    </div>
                    <div class="memo-edit-btn" onclick="openMemoModal()" title="코멘트 수정">
                        <i class="fa-solid fa-pen"></i>
                    </div>
                </div>
                <p class="memo-text" id="ui-memo">로딩 중...</p>
            </div>
        </div>
    </div>

    <div class="schedule-section section-gap">
        <div class="section-label">최차장 주간 일정</div>
        <div class="schedule-grid" id="ui-schedule"></div>
    </div>

    <div class="categories-section">
        <div class="section-label-wrap">
            <div class="section-label">업무 분류 <span id="total-tasks-label"></span></div>
            <button class="toggle-archive-btn" id="btn-toggle-archive" onclick="toggleArchiveMode()">
                <i class="fa-solid fa-box-archive"></i> <span id="archive-btn-text">종료된 업무만 모아보기</span>
            </button>
        </div>
        
        <div class="category-grid">
            <div class="cat-card" id="card-사고관리" data-cat="사고관리" onclick="selectCategory('사고관리')">
                <div class="cat-icon-wrap"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="cat-name">사고관리</div>
                <div class="cat-footer"><span class="cat-status">Active</span><span class="cat-badge" id="badge-사고관리">0</span></div>
            </div>
            <div class="cat-card" id="card-입찰지원" data-cat="입찰지원" onclick="selectCategory('입찰지원')">
                <div class="cat-icon-wrap"><i class="fa-solid fa-layer-group"></i></div>
                <div class="cat-name">입찰지원</div>
                <div class="cat-footer"><span class="cat-status">Active</span><span class="cat-badge" id="badge-입찰지원">0</span></div>
            </div>
            <div class="cat-card" id="card-노무관리" data-cat="노무관리" onclick="selectCategory('노무관리')">
                <div class="cat-icon-wrap"><i class="fa-solid fa-user-group"></i></div>
                <div class="cat-name">노무관리</div>
                <div class="cat-footer"><span class="cat-status">Active</span><span class="cat-badge" id="badge-노무관리">0</span></div>
            </div>
            <div class="cat-card" id="card-인증관리" data-cat="인증관리" onclick="selectCategory('인증관리')">
                <div class="cat-icon-wrap"><i class="fa-solid fa-certificate"></i></div>
                <div class="cat-name">인증관리</div>
                <div class="cat-footer"><span class="cat-status">Active</span><span class="cat-badge" id="badge-인증관리">0</span></div>
            </div>
            <div class="cat-card" id="card-법무관리" data-cat="법무관리" onclick="selectCategory('법무관리')">
                <div class="cat-icon-wrap"><i class="fa-solid fa-scale-balanced"></i></div>
                <div class="cat-name">법무관리</div>
                <div class="cat-footer"><span class="cat-status">Active</span><span class="cat-badge" id="badge-법무관리">0</span></div>
            </div>
            <div class="cat-card" id="card-기타관리" data-cat="기타관리" onclick="selectCategory('기타관리')">
                <div class="cat-icon-wrap"><i class="fa-solid fa-ellipsis"></i></div>
                <div class="cat-name">기타관리</div>
                <div class="cat-footer"><span class="cat-status">Active</span><span class="cat-badge" id="badge-기타관리">0</span></div>
            </div>
        </div>

        <div id="content-area">
            <div class="content-header">
                <div class="content-title-wrap">
                    <span class="content-title" id="ui-list-title">—</span>
                    <span class="content-count" id="ui-list-count"></span>
                </div>
                <div class="filter-controls">
                    <div class="search-input-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-keyword" class="search-box" placeholder="결과 내 검색..." oninput="filterAndRenderList()">
                    </div>
                </div>
            </div>
            <div id="ui-post-list"></div>
        </div>
    </div>
</div>

<div id="inputModal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
        <div class="modal-title" id="modal-ui-title">새 업무 추가</div>
        <input type="hidden" id="reg-id">
        <div class="field-wrap">
            <div class="field-label">분류</div>
            <select id="reg-cat">
                <option value="사고관리">사고관리</option>
                <option value="입찰지원">입찰지원</option>
                <option value="노무관리">노무관리</option>
                <option value="인증관리">인증관리</option>
                <option value="법무관리">법무관리</option>
                <option value="기타관리">기타관리</option>
            </select>
        </div>
        <div class="field-wrap">
            <div class="field-label">업무 제목</div>
            <input type="text" id="reg-title" placeholder="제목을 입력하세요">
        </div>
        <div class="field-wrap">
            <div class="field-label">내용</div>
            <textarea id="reg-content" rows="4" placeholder="상세 내용을 입력하세요" style="resize:none;"></textarea>
        </div>
        <div style="display:flex;gap:12px;">
            <div class="field-wrap" style="flex:1;">
                <div class="field-label">시작일</div>
                <input type="date" id="reg-startdate">
            </div>
            <div class="field-wrap" style="flex:1;">
                <div class="field-label">종료일</div>
                <input type="date" id="reg-duedate">
            </div>
        </div>
        <div class="field-wrap">
            <div class="field-label">파일 첨부</div>
            <label for="reg-file" class="modal-content-file-label" id="file-label-text">
                <i class="fa-solid fa-cloud-arrow-up" style="margin-right:6px;"></i>파일 선택 (최대 25MB)
            </label>
            <input type="file" id="reg-file" style="display:none;" onchange="updateFileLabel(this)">
        </div>
        <div class="modal-actions">
            <button class="btn-primary" id="btn-save-submit" onclick="handleSave()">구글시트 저장</button>
            <button class="btn-ghost" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<div id="memoModal" class="modal" onclick="if(event.target===this)closeMemoModal()">
    <div class="modal-content">
        <div class="modal-title">실장 코멘트 수정</div>
        <div class="field-wrap">
            <div class="field-label">코멘트</div>
            <textarea id="edit-memo-text" rows="4" placeholder="실장 코멘트를 입력하세요" style="resize:none;"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-primary" onclick="handleMemoSave()">구글시트 반영</button>
            <button class="btn-ghost" onclick="closeMemoModal()">취소</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby08KHN5Wf5_lJ8QnXI5L3rLqE6C4i3_wOuciB5gIjUyhPNZpHsKGAIr0loeSB3m0CT/exec";

    let AppState = {
        memo: "", schedule: [],
        tasks: { "사고관리": [], "입찰지원": [], "노무관리": [], "인증관리": [], "법무관리": [], "기타관리": [] },
        selectedCategory: null,
        onlyArchiveMode: false
    };

    async function initApp(forceReload = false) {
        const overlay = document.getElementById('loading-overlay');
        
        const cachedData = localStorage.getItem('warehouse_cache_data');
        if (!forceReload && cachedData) {
            try {
                const parsed = JSON.parse(cachedData);
                parseAndSetState(parsed);
                overlay.style.display = 'none';
                render();
                return;
            } catch(e) { localStorage.removeItem('warehouse_cache_data'); }
        }

        overlay.classList.remove('fade-out'); overlay.style.display = 'flex';
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            localStorage.setItem('warehouse_cache_data', JSON.stringify(data));
            parseAndSetState(data);
        } catch (error) {
            console.error('Fetch error:', error);
        } finally {
            overlay.classList.add('fade-out');
            setTimeout(() => overlay.style.display = 'none', 300);
            render();
        }
    }

    function parseAndSetState(data) {
        AppState.tasks = data.tasks || AppState.tasks;
        AppState.memo = data.memo || "등록된 코멘트가 없습니다.";
        AppState.schedule = data.schedule || [];
        AppState.lastSync = data.lastSync || "—";
        const todayKey = new Date().toISOString().split('T')[0];
        AppState.schedule.forEach(s => s.isToday = (s.fullDate === todayKey));
    }

    function syncForce() { initApp(true); }

    function goHome() {
        AppState.selectedCategory = null;
        AppState.onlyArchiveMode = false;
        document.getElementById('btn-toggle-archive').classList.remove('active');
        document.getElementById('archive-btn-text').innerText = "종료된 업무만 모아보기";
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleArchiveMode() {
        AppState.onlyArchiveMode = !AppState.onlyArchiveMode;
        const btn = document.getElementById('btn-toggle-archive');
        const txt = document.getElementById('archive-btn-text');
        
        if (AppState.onlyArchiveMode) {
            btn.classList.add('active');
            txt.innerText = "진행중인 업무 복귀";
        } else {
            btn.classList.remove('active');
            txt.innerText = "종료된 업무만 모아보기";
        }
        render();
    }

    function render() {
        let total = 0; let doneTotal = 0;
        for (let cat in AppState.tasks) {
            const cnt = AppState.tasks[cat].length; total += cnt;
            doneTotal += AppState.tasks[cat].filter(t => t.status === 'done').length;
            
            if (AppState.onlyArchiveMode) {
                document.getElementById(`badge-${cat}`).innerText = AppState.tasks[cat].filter(t => t.status === 'done').length;
            } else {
                document.getElementById(`badge-${cat}`).innerText = AppState.tasks[cat].filter(t => t.status !== 'done').length;
            }

            const card = document.getElementById(`card-${cat}`);
            if (AppState.selectedCategory === cat) card.classList.add('selected');
            else card.classList.remove('selected');
        }

        const progressPercent = total > 0 ? Math.round((doneTotal / total) * 100) : 0;
        document.getElementById('ui-progress-fill').style.width = `${progressPercent}%`;
        document.getElementById('ui-progress-percent').innerText = `${progressPercent}%`;
        document.getElementById('nav-total').innerText = total;
        document.getElementById('total-tasks-label').innerText = `(전체 ${total}건)`;
        document.getElementById('nav-sync').innerText = AppState.lastSync;
        document.getElementById('ui-memo').innerText = AppState.memo;

        const schDiv = document.getElementById('ui-schedule');
        schDiv.innerHTML = AppState.schedule.map(s => {
            const dayName = s.id ? s.id : '';
            const cls = ['sch-card', s.isToday ? 'today' : '', s.isHoliday ? 'holiday' : ''].filter(Boolean).join(' ');
            return `
            <div class="${cls}">
                <div class="sch-top"><span class="sch-day">${dayName}</span>${s.isToday ? '<span class="badge-today">TODAY</span>' : ''}</div>
                <div class="sch-date">${s.date}</div>
                ${s.isHoliday ? `<div class="holiday-name">${s.holiday}</div>` : ''}
                <div class="sch-loc">${s.loc || '—'}</div>
            </div>`;
        }).join('');

        filterAndRenderList();
    }

    function filterAndRenderList() {
        const area = document.getElementById('content-area');
        if (!AppState.selectedCategory) { area.style.display = 'none'; return; }

        area.style.display = 'block';
        const cat = AppState.selectedCategory;
        const items = AppState.tasks[cat];
        document.getElementById('ui-list-title').innerText = `${cat} ${AppState.onlyArchiveMode ? '[종료 아카이브]' : ''}`;

        const searchKeyword = document.getElementById('search-keyword').value.toLowerCase().trim();

        let filtered = items.filter(t => {
            if (AppState.onlyArchiveMode && t.status !== 'done') return false;
            if (!AppState.onlyArchiveMode && t.status === 'done') return false;
            
            if (searchKeyword) {
                const inTitle = (t.title || '').toLowerCase().includes(searchKeyword);
                const inContent = (t.content || '').toLowerCase().includes(searchKeyword);
                return inTitle || inContent;
            }
            return true;
        });

        const sorted = filtered.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        const activeCount = items.filter(t => t.status !== 'done').length;
        document.getElementById('ui-list-count').innerText = `${activeCount}건 진행 중 / ${items.length - activeCount}건 완료 (검색결과: ${sorted.length}건)`;

        const listDiv = document.getElementById('ui-post-list');
        if (sorted.length === 0) {
            listDiv.innerHTML = `<div class="list-empty">${AppState.onlyArchiveMode ? '종료 및 보관된 업무가 없습니다.' : '현재 진행 중인 업무가 없습니다.'}</div>`; return;
        }

        listDiv.innerHTML = sorted.map(t => {
            const isDone = t.status === 'done';
            return `
            <div class="list-row${isDone ? ' done' : ''}">
                <div class="list-info">
                    <span class="list-date">${t.date} 등록</span>
                    <span class="list-title">${t.title}</span>
                    ${t.content ? `<span class="list-content">${t.content}</span>` : ''}
                    ${t.duedate ? `<span class="list-duedate"><i class="fa-regular fa-clock"></i> 목표일: ${t.duedate}</span>` : ''}
                    ${t.fileUrl ? `<a href="${t.fileUrl}" target="_blank" class="list-attachment"><i class="fa-solid fa-paperclip"></i> 첨부파일 링크</a>` : ''}
                </div>
                <div class="list-actions">
                    <button class="btn-done${isDone ? ' active' : ''}" onclick="toggleDone('${t.id}')" title="${isDone ? '진행중 상태로 변경' : '완료 처리'}">
                        <i class="fa-solid fa-check"></i>
                    </button>
                    <button class="btn-mod" onclick="openModifyModal('${cat}', '${t.id}')" title="상세 수정">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="btn-del" onclick="handleDelete('${cat}', '${t.id}')" title="삭제">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function updateFileLabel(input) {
        const textEl = document.getElementById('file-label-text');
        if (input.files && input.files.length > 0) {
            textEl.innerHTML = `<i class="fa-solid fa-file" style="margin-right:6px; color:var(--accent-blue);"></i>${input.files[0].name}`;
        } else {
            textEl.innerHTML = `<i class="fa-solid fa-cloud-arrow-up" style="margin-right:6px;"></i>파일 선택 (최대 25MB)`;
        }
    }

    function selectCategory(cat) {
        AppState.selectedCategory = cat;
        if (document.getElementById('reg-cat')) document.getElementById('reg-cat').value = cat;
        document.getElementById('search-keyword').value = "";
        render();
        setTimeout(() => {
            const el = document.getElementById('content-area');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
    }

    function openModal() {
        document.getElementById('modal-ui-title').innerText = "새 업무 추가";
        document.getElementById('reg-id').value = "";
        document.getElementById('inputModal').classList.add('active'); // 버그 수정 완료
        document.getElementById('reg-startdate').value = new Date().toISOString().split('T')[0];
        setTimeout(() => document.getElementById('reg-title').focus(), 200);
    }

    function openModifyModal(cat, id) {
        const targetItem = AppState.tasks[cat].find(t => String(t.id) === String(id));
        if (!targetItem) return;
        document.getElementById('modal-ui-title').innerText = "업무 상세 수정";
        document.getElementById('reg-id').value = targetItem.id;
        document.getElementById('reg-cat').value = cat;
        document.getElementById('reg-title').value = targetItem.title;
        document.getElementById('reg-content').value = targetItem.content || '';
        document.getElementById('reg-startdate').value = targetItem.date;
        document.getElementById('reg-duedate').value = targetItem.duedate || '';
        document.getElementById('inputModal').classList.add('active');
        setTimeout(() => document.getElementById('reg-title').focus(), 200);
    }

    function closeModal() {
        document.getElementById('inputModal').classList.remove('active');
        document.getElementById('reg-id').value = ''; document.getElementById('reg-title').value = ''; document.getElementById('reg-content').value = '';
        document.getElementById('reg-startdate').value = ''; document.getElementById('reg-duedate').value = ''; document.getElementById('reg-file').value = '';
        document.getElementById('file-label-text').innerHTML = `<i class="fa-solid fa-cloud-arrow-up" style="margin-right:6px;"></i>파일 선택 (최대 25MB)`;
        document.getElementById('btn-save-submit').innerText = "구글시트 저장"; document.getElementById('btn-save-submit').disabled = false;
    }

    function openMemoModal() {
        document.getElementById('edit-memo-text').value = AppState.memo;
        document.getElementById('memoModal').classList.add('active');
        setTimeout(() => document.getElementById('edit-memo-text').focus(), 200);
    }
    function closeMemoModal() { document.getElementById('memoModal').classList.remove('active'); }

    function getGlobalPassword() {
        const pwd = document.getElementById('global-auth-pwd').value.trim();
        if (!pwd) { alert("🔒 상단 바의 인증코드를 입력하십시오."); return null; }
        return pwd;
    }

    async function handleSave() {
        const id = document.getElementById('reg-id').value;
        const cat = document.getElementById('reg-cat').value;
        const title = document.getElementById('reg-title').value.trim();
        const content = document.getElementById('reg-content').value.trim();
        const startdate = document.getElementById('reg-startdate').value || new Date().toISOString().split('T')[0];
        const duedate = document.getElementById('reg-duedate').value;
        const fileInput = document.getElementById('reg-file');
        
        if (!title) return;
        const pwd = getGlobalPassword(); if (pwd === null) return;

        const submitBtn = document.getElementById('btn-save-submit');
        submitBtn.innerText = "처리 중..."; submitBtn.disabled = true;

        let payload = {
            action: id ? 'updateTask' : 'addTask', id: id ? id : Date.now().toString(), category: cat,
            date: startdate, title: title, content: content, duedate: duedate, password: pwd,
            fileData: null, fileName: null, fileMime: null
        };

        if (fileInput.files && fileInput.files.length > 0) {
            const file = fileInput.files[0]; const reader = new FileReader();
            reader.onload = async function(e) {
                payload.fileData = e.target.result.split(',')[1]; payload.fileName = file.name; payload.fileMime = file.type;
                await sendTaskData(payload);
            };
            reader.readAsDataURL(file);
        } else {
            await sendTaskData(payload);
        }
    }

    async function sendTaskData(payload) {
        try {
            const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === "auth_error") { alert(result.message); } 
            else { localStorage.removeItem('warehouse_cache_data'); await initApp(true); closeModal(); }
        } catch (e) { alert("통신 오류가 발생했습니다."); } 
        finally { document.getElementById('btn-save-submit').innerText = "구글시트 저장"; document.getElementById('btn-save-submit').disabled = false; }
    }

    async function handleMemoSave() {
        const newMemo = document.getElementById('edit-memo-text').value.trim();
        if (!newMemo) return;
        const pwd = getGlobalPassword(); if (pwd === null) return;

        try {
            const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'updateMemo', memo: newMemo, password: pwd }) });
            const result = await res.json();
            if (result.status === "auth_error") { alert(result.message); } 
            else { localStorage.removeItem('warehouse_cache_data'); await initApp(true); closeMemoModal(); }
        } catch (e) { alert("통신 오류가 발생했습니다."); }
    }

    async function handleDelete(cat, id) {
        const pwd = getGlobalPassword(); if (pwd === null) return;
        try {
            const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'deleteTask', id: id, password: pwd }) });
            const result = await res.json();
            if (result.status === "auth_error") { alert(result.message); } 
            else { localStorage.removeItem('warehouse_cache_data'); await initApp(true); }
        } catch (e) { alert("통신 오류가 발생했습니다."); }
    }

    async function toggleDone(id) {
        const pwd = getGlobalPassword(); if (pwd === null) return;
        try {
            const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'toggleStatus', id: id, password: pwd }) });
            const result = await res.json();
            if (result.status === "auth_error") { alert(result.message); } 
            else { localStorage.removeItem('warehouse_cache_data'); await initApp(true); }
        } catch(e) { alert("통신 오류가 발생했습니다."); }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeMemoModal(); } });
    initApp();
</script>
</body>
</html>
