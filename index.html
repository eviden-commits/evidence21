<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>업무창고 — 품질안전보건실</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sys-bg:#F5F5F7; --sys-surface:#FFFFFF; --sys-surface-2:#F5F5F7;
            --sys-label:#1D1D1F; --sys-label-2:#3C3C43; --sys-label-3:#6C6C70; --sys-label-4:#AEAEB2;
            --sys-separator:rgba(60,60,67,0.12); --sys-separator-2:rgba(60,60,67,0.06);
            --sys-blue:#007AFF; --sys-blue-bg:rgba(0,122,255,0.08);
            --sys-green:#34C759; --sys-green-bg:rgba(52,199,89,0.10);
            --sys-red:#FF3B30; --sys-red-bg:rgba(255,59,48,0.10);
            --sys-orange:#FF9500; --sys-orange-bg:rgba(255,149,0,0.10);
            --sys-purple:#AF52DE; --sys-purple-bg:rgba(175,82,222,0.10);
            --sys-gray:#636366; --sys-gray-bg:rgba(99,99,102,0.10);
            --font-sans:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
            --font-mono:'JetBrains Mono','SF Mono',monospace;
            --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px;
            --shadow-xs:0 1px 1px rgba(0,0,0,0.04);
            --shadow-sm:0 1px 2px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.04);
            --shadow-md:0 2px 4px rgba(0,0,0,0.04),0 8px 24px rgba(0,0,0,0.06);
            --shadow-lg:0 4px 8px rgba(0,0,0,0.06),0 16px 40px rgba(0,0,0,0.08);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{font-family:var(--font-sans);background:var(--sys-bg);color:var(--sys-label);min-height:100vh;padding-bottom:100px;-webkit-font-smoothing:antialiased;letter-spacing:-0.022em;touch-action:manipulation;}

        /* LOADING */
        #loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--sys-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity 0.3s ease;}
        #loading-overlay.fade-out{opacity:0;pointer-events:none;}
        .loader-wordmark{font-size:11px;font-weight:600;color:var(--sys-label-4);letter-spacing:0.16em;text-transform:uppercase;font-family:var(--font-mono);}
        .loader-track{width:160px;height:1.5px;background:var(--sys-separator);border-radius:1px;overflow:hidden;}
        .loader-track::after{content:'';display:block;height:100%;width:40%;background:var(--sys-label-3);animation:slide 0.9s cubic-bezier(0.4,0,0.2,1) infinite alternate;}
        @keyframes slide{from{transform:translateX(-100%)}to{transform:translateX(200%)}}

        /* NAV */
        .top-nav{position:sticky;top:0;z-index:200;height:52px;background:rgba(245,245,247,0.82);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-bottom:0.5px solid var(--sys-separator);padding:0 32px;display:flex;align-items:center;justify-content:space-between;}
        .nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 8px;border-radius:var(--r-xs);transition:background 0.12s;}
        .nav-brand:hover{background:rgba(0,0,0,0.05);}
        .nav-brand-icon{width:28px;height:28px;border-radius:7px;background:var(--sys-label);display:flex;align-items:center;justify-content:center;}
        .nav-brand-icon svg{width:14px;height:14px;fill:white;}
        .nav-brand-name{font-size:14px;font-weight:600;}
        .nav-center{display:flex;align-items:center;gap:6px;}
        .nav-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:rgba(0,0,0,0.05);font-size:12px;font-weight:500;color:var(--sys-label-3);}
        .nav-pill-accent{color:var(--sys-label);font-weight:600;font-family:var(--font-mono);}
        .progress-ring{width:18px;height:18px;}
        .progress-ring-bg{fill:none;stroke:rgba(0,0,0,0.08);stroke-width:2.5;}
        .progress-ring-fill{fill:none;stroke:var(--sys-green);stroke-width:2.5;stroke-linecap:round;transform-origin:center;transform:rotate(-90deg);stroke-dasharray:44;stroke-dashoffset:44;transition:stroke-dashoffset 0.4s cubic-bezier(0.4,0,0.2,1);}
        .nav-right{display:flex;align-items:center;gap:6px;}
        .nav-sync-label{font-size:11px;color:var(--sys-label-4);font-family:var(--font-mono);padding-right:4px;}
        .cache-chip{font-size:10px;font-weight:600;color:var(--sys-orange);background:var(--sys-orange-bg);padding:2px 8px;border-radius:10px;letter-spacing:0.02em;}
        .nav-auth-wrap{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r-xs);background:rgba(0,0,0,0.04);border:0.5px solid transparent;transition:all 0.15s;}
        .nav-auth-wrap:focus-within{background:var(--sys-surface);border-color:var(--sys-separator-2);box-shadow:var(--shadow-sm);}
        .nav-auth-wrap i{font-size:10px;color:var(--sys-label-4);}
        .nav-auth-field{border:none;background:transparent;font-size:12px;width:76px;outline:none;font-family:var(--font-mono);color:var(--sys-label);}
        .nav-divider{width:1px;height:18px;background:var(--sys-separator);margin:0 2px;}
        .nav-icon-btn{width:32px;height:32px;border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--sys-label-3);font-size:13px;cursor:pointer;transition:all 0.12s;}
        .nav-icon-btn:hover{background:rgba(0,0,0,0.06);color:var(--sys-label);}
        .nav-icon-btn.cta{background:var(--sys-label);color:white;}
        .nav-icon-btn.cta:hover{background:rgba(29,29,31,0.85);}

        /* LAYOUT */
        .container{max-width:980px;margin:0 auto;padding:36px 32px;}
        .section{margin-bottom:36px;}
        .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
        .section-title{font-size:11px;font-weight:600;color:var(--sys-label-4);text-transform:uppercase;letter-spacing:0.07em;}

        /* MEMO */
        .memo-card{background:var(--sys-surface);border-radius:var(--r-lg);padding:20px 22px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow-sm);}
        .memo-avatar{width:36px;height:36px;border-radius:11px;background:var(--sys-label);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
        .memo-body{flex:1;min-width:0;}
        .memo-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
        .memo-name-row{display:flex;align-items:baseline;gap:6px;}
        .memo-name{font-size:13px;font-weight:600;}
        .memo-role{font-size:12px;color:var(--sys-label-4);}
        .memo-edit{width:28px;height:28px;border-radius:8px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sys-label-4);font-size:12px;transition:all 0.12s;}
        .memo-edit:hover{background:var(--sys-surface-2);color:var(--sys-label-2);}
        .memo-text{font-size:13.5px;line-height:1.65;color:var(--sys-label-2);white-space:pre-wrap;}

        /* SCHEDULE */
        .schedule-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
        .sch-card{background:var(--sys-surface);border-radius:var(--r-md);padding:14px 16px;min-height:100px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-xs);transition:transform 0.15s;}
        .sch-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);}
        .sch-card.today{background:var(--sys-label);box-shadow:0 4px 16px rgba(0,0,0,0.18);}
        .sch-card.holiday .sch-date,.sch-card.holiday .sch-dayname{color:var(--sys-red);}
        .sch-top{display:flex;align-items:center;justify-content:space-between;}
        .sch-dayname{font-size:10px;font-weight:600;color:var(--sys-label-4);letter-spacing:0.05em;text-transform:uppercase;}
        .sch-card.today .sch-dayname{color:rgba(255,255,255,0.45);}
        .today-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,0.15);color:white;padding:1px 6px;border-radius:10px;font-family:var(--font-mono);}
        .sch-date{font-family:var(--font-mono);font-size:24px;font-weight:300;margin:6px 0 2px;color:var(--sys-label);}
        .sch-card.today .sch-date{color:white;}
        .sch-loc{font-size:11.5px;font-weight:500;color:var(--sys-label-3);line-height:1.4;}
        .sch-card.today .sch-loc{color:rgba(255,255,255,0.75);}
        .holiday-label{font-size:11px;color:var(--sys-red);font-weight:500;margin-top:2px;}
        .sch-card.today .holiday-label{color:rgba(255,120,110,0.9);}

        /* CATEGORIES */
        .categories-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
        .head-btn-group{display:flex;align-items:center;gap:6px;}
        .pill-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;background:var(--sys-surface);border:0.5px solid var(--sys-separator);font-size:12px;font-weight:500;color:var(--sys-label-3);cursor:pointer;transition:all 0.15s;user-select:none;box-shadow:var(--shadow-xs);}
        .pill-btn:hover{color:var(--sys-label);}
        .pill-btn.active{background:var(--sys-label);color:white;border-color:var(--sys-label);}
        .pill-btn.kpi{color:var(--sys-blue);border-color:rgba(0,122,255,0.2);background:var(--sys-blue-bg);}
        .pill-btn.kpi:hover{background:var(--sys-blue);color:white;border-color:var(--sys-blue);}

        /* GLOBAL SEARCH BAR */
        .global-search-bar{display:flex;align-items:center;gap:8px;background:var(--sys-surface);border:0.5px solid var(--sys-separator);border-radius:var(--r-sm);padding:8px 14px;margin-bottom:10px;box-shadow:var(--shadow-xs);transition:all 0.15s;}
        .global-search-bar:focus-within{border-color:var(--sys-blue);box-shadow:0 0 0 3px var(--sys-blue-bg);}
        .global-search-bar i{color:var(--sys-label-4);font-size:13px;}
        .global-search-input{flex:1;border:none;background:transparent;font-size:14px;font-family:var(--font-sans);color:var(--sys-label);outline:none;}
        .global-search-input::placeholder{color:var(--sys-label-4);}
        .gsb-clear{background:none;border:none;color:var(--sys-label-4);cursor:pointer;padding:2px 4px;border-radius:4px;font-size:13px;transition:all 0.12s;}
        .gsb-clear:hover{color:var(--sys-label);background:rgba(0,0,0,0.05);}

        /* CATEGORY GRID */
        .category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
        .cat-card{background:var(--sys-surface);border-radius:var(--r-md);padding:14px 16px;cursor:pointer;transition:all 0.18s cubic-bezier(0.4,0,0.2,1);box-shadow:var(--shadow-xs);border:1.5px solid transparent;}
        .cat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
        .cat-card.selected{border-color:var(--sys-label);box-shadow:var(--shadow-sm);}
        .cat-card:focus-visible{outline:2px solid var(--sys-blue);outline-offset:2px;}
        .cat-header{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
        .cat-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
        .cat-name{font-size:13px;font-weight:600;color:var(--sys-label);}
        .cat-progress-track{height:3px;background:rgba(0,0,0,0.06);border-radius:2px;overflow:hidden;margin-bottom:10px;}
        .cat-progress-fill{height:100%;width:0%;border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
        .cat-footer{display:flex;align-items:center;justify-content:space-between;}
        .cat-status{font-size:10px;font-weight:600;color:var(--sys-label-4);text-transform:uppercase;letter-spacing:0.04em;}
        .cat-footer-right{display:flex;align-items:center;gap:5px;}
        .overdue-badge{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--sys-red-bg);color:var(--sys-red);}
        .cat-count{font-family:var(--font-mono);font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px;}

        /* Category color tokens */
        .cat-card[data-cat="사고관리"] .cat-icon{background:var(--sys-red-bg);color:var(--sys-red);}
        .cat-card[data-cat="사고관리"] .cat-count{background:var(--sys-red-bg);color:var(--sys-red);}
        .cat-card[data-cat="사고관리"] .cat-progress-fill{background:var(--sys-red);}
        .cat-card[data-cat="입찰지원"] .cat-icon{background:var(--sys-blue-bg);color:var(--sys-blue);}
        .cat-card[data-cat="입찰지원"] .cat-count{background:var(--sys-blue-bg);color:var(--sys-blue);}
        .cat-card[data-cat="입찰지원"] .cat-progress-fill{background:var(--sys-blue);}
        .cat-card[data-cat="노무관리"] .cat-icon{background:var(--sys-orange-bg);color:var(--sys-orange);}
        .cat-card[data-cat="노무관리"] .cat-count{background:var(--sys-orange-bg);color:var(--sys-orange);}
        .cat-card[data-cat="노무관리"] .cat-progress-fill{background:var(--sys-orange);}
        .cat-card[data-cat="인증관리"] .cat-icon{background:var(--sys-green-bg);color:var(--sys-green);}
        .cat-card[data-cat="인증관리"] .cat-count{background:var(--sys-green-bg);color:var(--sys-green);}
        .cat-card[data-cat="인증관리"] .cat-progress-fill{background:var(--sys-green);}
        .cat-card[data-cat="법무관리"] .cat-icon{background:var(--sys-purple-bg);color:var(--sys-purple);}
        .cat-card[data-cat="법무관리"] .cat-count{background:var(--sys-purple-bg);color:var(--sys-purple);}
        .cat-card[data-cat="법무관리"] .cat-progress-fill{background:var(--sys-purple);}
        .cat-card[data-cat="기타관리"] .cat-icon{background:var(--sys-gray-bg);color:var(--sys-gray);}
        .cat-card[data-cat="기타관리"] .cat-count{background:var(--sys-gray-bg);color:var(--sys-gray);}
        .cat-card[data-cat="기타관리"] .cat-progress-fill{background:var(--sys-gray);}

        /* CONTENT PANEL */
        #content-area{display:none;background:var(--sys-surface);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-md);animation:slideDown 0.22s cubic-bezier(0.4,0,0.2,1) both;}
        @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .content-header{padding:12px 22px;border-bottom:0.5px solid var(--sys-separator);display:flex;align-items:center;justify-content:space-between;background:var(--sys-surface-2);gap:10px;flex-wrap:wrap;}
        .content-title-row{display:flex;align-items:center;gap:10px;}
        .content-title{font-size:14px;font-weight:600;color:var(--sys-label);}
        .content-count{font-size:12px;color:var(--sys-label-4);font-family:var(--font-mono);}
        .content-controls{display:flex;align-items:center;gap:6px;}
        .sort-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r-xs);border:0.5px solid var(--sys-separator);background:var(--sys-surface);font-size:11px;font-weight:600;color:var(--sys-label-3);cursor:pointer;transition:all 0.12s;font-family:var(--font-sans);}
        .sort-btn:hover{color:var(--sys-label);border-color:var(--sys-label-4);}
        .search-wrap{position:relative;}
        .search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sys-label-4);font-size:11px;pointer-events:none;}
        .search-box{padding:7px 12px 7px 28px;border:0.5px solid var(--sys-separator);border-radius:var(--r-xs);font-size:13px;outline:none;background:var(--sys-surface);width:150px;transition:all 0.15s;font-family:var(--font-sans);color:var(--sys-label);}
        .search-box::placeholder{color:var(--sys-label-4);}
        .search-box:focus{width:200px;border-color:var(--sys-blue);box-shadow:0 0 0 3px var(--sys-blue-bg);}

        /* TASK LIST */
        #ui-post-list{padding:0 22px;}
        .list-row{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 0;gap:16px;border-bottom:0.5px solid var(--sys-separator);transition:opacity 0.15s;}
        .list-row:last-child{border-bottom:none;}
        .list-row.done{opacity:0.42;}
        .list-row.done .list-title{text-decoration:line-through;color:var(--sys-label-3);}
        .list-info{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
        .list-cat-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;background:var(--sys-gray-bg);color:var(--sys-gray);margin-bottom:2px;width:fit-content;}
        .list-date{font-family:var(--font-mono);font-size:11px;color:var(--sys-label-4);}
        .list-title{font-size:14px;font-weight:600;color:var(--sys-label);line-height:1.45;}
        .list-content{font-size:13px;color:var(--sys-label-3);line-height:1.55;white-space:pre-wrap;margin-top:2px;}
        .list-duedate{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:var(--font-mono);color:var(--sys-label-3);margin-top:4px;}
        .list-duedate.overdue{color:var(--sys-red);background:var(--sys-red-bg);padding:2px 6px;border-radius:4px;font-weight:600;}
        .list-attachment{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:12px;color:var(--sys-blue);font-weight:500;text-decoration:none;}
        .list-attachment:hover{text-decoration:underline;}
        .list-actions{display:flex;gap:2px;flex-shrink:0;padding-top:2px;}
        .act-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--sys-label-4);font-size:12px;cursor:pointer;transition:all 0.12s;}
        .act-btn.done-btn:hover{background:var(--sys-green-bg);color:var(--sys-green);}
        .act-btn.done-btn.active{background:var(--sys-green-bg);color:var(--sys-green);}
        .act-btn.mod-btn:hover{background:var(--sys-blue-bg);color:var(--sys-blue);}
        .act-btn.del-btn:hover{background:var(--sys-red-bg);color:var(--sys-red);}
        .list-empty{padding:52px 0;text-align:center;color:var(--sys-label-4);font-size:14px;}
        .list-empty i{font-size:28px;display:block;margin-bottom:12px;}

        /* MODALS */
        .modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.32);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;}
        .modal.active{display:flex;}
        .modal-sheet{background:var(--sys-surface);width:100%;max-width:430px;border-radius:var(--r-xl);padding:28px 24px 20px;box-shadow:var(--shadow-lg);animation:sheetUp 0.22s cubic-bezier(0.34,1.56,0.64,1) both;}
        .modal-sheet.wide{max-width:560px;}
        @keyframes sheetUp{from{transform:scale(0.95) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
        .modal-title{font-size:17px;font-weight:700;color:var(--sys-label);margin-bottom:20px;letter-spacing:-0.02em;}
        .modal-subtitle{font-size:13px;color:var(--sys-label-3);margin-top:-14px;margin-bottom:20px;}
        .field-group{margin-bottom:14px;}
        .field-label{font-size:11px;font-weight:600;color:var(--sys-label-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
        .modal-sheet input,.modal-sheet textarea,.modal-sheet select{display:block;width:100%;padding:10px 14px;border:1px solid var(--sys-separator);border-radius:var(--r-sm);font-size:14px;font-family:var(--font-sans);color:var(--sys-label);background:var(--sys-surface-2);outline:none;transition:all 0.15s;-webkit-appearance:none;}
        .modal-sheet input:focus,.modal-sheet textarea:focus,.modal-sheet select:focus{border-color:var(--sys-blue);background:var(--sys-surface);box-shadow:0 0 0 3px var(--sys-blue-bg);}
        .modal-sheet textarea{resize:none;}
        .date-row{display:flex;gap:10px;}
        .date-row .field-group{flex:1;}
        .file-drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px;border-radius:var(--r-sm);border:1.5px dashed var(--sys-separator);background:var(--sys-surface-2);cursor:pointer;transition:all 0.15s;text-align:center;}
        .file-drop-zone:hover{border-color:var(--sys-blue);background:var(--sys-blue-bg);}
        .file-drop-zone i{font-size:18px;color:var(--sys-label-4);}
        .file-drop-zone span{font-size:12px;color:var(--sys-label-3);font-weight:500;}
        .modal-actions{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
        .btn-fill{width:100%;padding:13px;border-radius:var(--r-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.12s;font-family:var(--font-sans);letter-spacing:-0.02em;}
        .btn-fill.dark{background:var(--sys-label);color:white;}
        .btn-fill.dark:hover{background:rgba(29,29,31,0.85);}
        .btn-text-only{width:100%;padding:10px;background:none;border:none;font-size:14px;color:var(--sys-label-3);cursor:pointer;font-family:var(--font-sans);transition:color 0.12s;}
        .btn-text-only:hover{color:var(--sys-label);}

        /* KPI */
        .kpi-summary-row{display:flex;gap:8px;margin-bottom:20px;}
        .kpi-summary-chip{flex:1;background:var(--sys-surface-2);border-radius:var(--r-sm);padding:12px 14px;}
        .kpi-chip-label{font-size:10px;font-weight:600;color:var(--sys-label-4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
        .kpi-chip-value{font-size:22px;font-weight:300;font-family:var(--font-mono);color:var(--sys-label);}
        .kpi-chip-value.green{color:var(--sys-green);}
        .kpi-month-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
        .kpi-month-row{display:grid;grid-template-columns:64px 1fr 44px;align-items:center;gap:12px;}
        .kpi-month-label{font-size:12px;font-family:var(--font-mono);color:var(--sys-label-3);}
        .kpi-bar-track{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden;}
        .kpi-bar-fill{height:100%;border-radius:3px;background:var(--sys-green);transition:width 0.4s ease;}
        .kpi-month-count{font-size:12px;font-family:var(--font-mono);color:var(--sys-label-3);text-align:right;}
        .kpi-cat-table{width:100%;border-collapse:collapse;}
        .kpi-cat-table th{font-size:10px;font-weight:600;color:var(--sys-label-4);text-transform:uppercase;letter-spacing:0.04em;padding:6px 8px;text-align:left;border-bottom:0.5px solid var(--sys-separator);}
        .kpi-cat-table td{font-size:13px;padding:8px 8px;border-bottom:0.5px solid var(--sys-separator-2);}
        .kpi-cat-table tr:last-child td{border-bottom:none;}
        .kpi-pct-badge{display:inline-block;font-family:var(--font-mono);font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;background:var(--sys-green-bg);color:var(--sys-green);}
        .kpi-pct-badge.mid{background:var(--sys-blue-bg);color:var(--sys-blue);}
        .kpi-pct-badge.low{background:var(--sys-red-bg);color:var(--sys-red);}
        .kpi-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--sys-surface-2);padding:3px;border-radius:var(--r-sm);}
        .kpi-tab{flex:1;padding:6px;border-radius:6px;border:none;background:none;font-size:12px;font-weight:500;color:var(--sys-label-3);cursor:pointer;transition:all 0.12s;}
        .kpi-tab.active{background:var(--sys-surface);color:var(--sys-label);box-shadow:var(--shadow-xs);font-weight:600;}

        /* PRINT */
        #print-view{display:none;}
        @media print {
            body>*:not(#print-view){display:none!important;}
            #print-view{display:block!important;font-family:'Pretendard',-apple-system,sans-serif;color:#1D1D1F;padding:20px 28px;font-size:13px;line-height:1.6;}
            .pv-header{border-bottom:2px solid #1D1D1F;padding-bottom:12px;margin-bottom:16px;}
            .pv-title{font-size:20px;font-weight:700;margin-bottom:4px;}
            .pv-meta{font-size:11px;color:#6C6C70;}
            .pv-summary{display:flex;gap:20px;margin-bottom:16px;padding:12px 14px;background:#F5F5F7;border-radius:8px;}
            .pv-summary-label{font-size:10px;font-weight:600;color:#6C6C70;text-transform:uppercase;letter-spacing:0.06em;}
            .pv-summary-value{font-size:18px;font-weight:300;}
            .pv-sch-grid{display:flex;gap:6px;margin-bottom:6px;}
            .pv-sch-card{flex:1;padding:8px 10px;border:0.5px solid #AEAEB2;border-radius:6px;}
            .pv-sch-today{background:#1D1D1F;color:white;border-color:#1D1D1F;}
            .pv-sch-day{font-size:9px;font-weight:600;color:#AEAEB2;text-transform:uppercase;}
            .pv-sch-today .pv-sch-day{color:rgba(255,255,255,0.5);}
            .pv-sch-date{font-size:16px;font-weight:300;margin:3px 0;}
            .pv-sch-today .pv-sch-date{color:white;}
            .pv-sch-loc{font-size:10px;color:#6C6C70;}
            .pv-sch-today .pv-sch-loc{color:rgba(255,255,255,0.7);}
            .pv-cat-section{margin-bottom:16px;page-break-inside:avoid;}
            .pv-cat-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-bottom:5px;border-bottom:0.5px solid #AEAEB2;}
            .pv-cat-name{font-size:13px;font-weight:700;}
            .pv-cat-stat{font-size:11px;color:#6C6C70;}
            .pv-task-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:0.5px solid rgba(60,60,67,0.06);}
            .pv-task-row:last-child{border-bottom:none;}
            .pv-task-body{flex:1;min-width:0;}
            .pv-task-title{font-size:13px;font-weight:600;margin-bottom:2px;}
            .pv-task-content{font-size:11px;color:#6C6C70;line-height:1.5;white-space:pre-wrap;}
            .pv-task-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
            .pv-task-date{font-size:10px;color:#AEAEB2;}
            .pv-task-due{font-size:11px;font-weight:600;color:#1D1D1F;}
            .pv-footer{margin-top:20px;padding-top:10px;border-top:0.5px solid #AEAEB2;font-size:10px;color:#AEAEB2;display:flex;justify-content:space-between;}
        }

        /* MOBILE */
        @media (max-width:700px){
            .category-grid{grid-template-columns:repeat(2,1fr);}
            .schedule-grid{grid-template-columns:repeat(2,1fr);}
            .top-nav{padding:0 16px;}
            .container{padding:24px 16px;}
            .nav-center{display:none;}
            .modal-sheet{max-width:100%;border-bottom-left-radius:0;border-bottom-right-radius:0;margin-top:auto;}
        }
        @media (hover:none) and (pointer:coarse){
            .act-btn{width:40px;height:40px;}
            .nav-icon-btn{width:40px;height:40px;}
        }
    </style>
</head>

<script>
    /* ── HELPERS ── */
    function todayStr() { return new Date().toLocaleDateString('en-CA'); } // ⑪ 로컬 타임존
    function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); } // ⑨ XSS
    function safeUrl(u) { if(!u)return''; try{const p=new URL(u).protocol;return['http:','https:'].includes(p)?u:'';}catch{return'';} } // ⑨

    const GAS_URL = "https://script.google.com/macros/s/AKfycby08KHN5Wf5_lJ8QnXI5L3rLqE6C4i3_wOuciB5gIjUyhPNZpHsKGAIr0loeSB3m0CT/exec";
    const CATS = ["사고관리","입찰지원","노무관리","인증관리","법무관리","기타관리"];
    const SORT_MODES = [{key:'date',label:'등록일'},{key:'duedate_asc',label:'마감일↑'},{key:'duedate_desc',label:'마감일↓'}];
    let _sortIdx = 0;
    let _sessionPwd = ''; // ② 세션 캐싱

    let AppState = {
        memo:"", schedule:[],
        tasks:{"사고관리":[],"입찰지원":[],"노무관리":[],"인증관리":[],"법무관리":[],"기타관리":[]},
        selectedCategory:null, onlyArchiveMode:false, lastSync:"—", globalQuery:""
    };

    /* ── PASSWORD ── */
    function onPwdInput(val) { _sessionPwd = val.trim(); } // ② 입력 즉시 캐싱
    function getGlobalPassword() {
        const field = document.getElementById('global-auth-pwd').value.trim();
        if (field) { _sessionPwd = field; return field; }

    /* ── INIT ── */
    async function initApp(forceReload=false) {
        const overlay = document.getElementById('loading-overlay');
        const cached = localStorage.getItem('warehouse_cache_data');
        if (!forceReload && cached) {
            try {
                parseAndSetState(JSON.parse(cached));
                overlay.style.display='none';
                document.getElementById('cache-chip').style.display=''; // ⑩ 캐시 표시
                render(); return;
            } catch(e) { localStorage.removeItem('warehouse_cache_data'); }
        }
        overlay.classList.remove('fade-out'); overlay.style.display='flex';
        try {
            const data = await fetch(GAS_URL).then(r=>r.json());
            localStorage.setItem('warehouse_cache_data', JSON.stringify(data));
            parseAndSetState(data);
            document.getElementById('cache-chip').style.display='none'; // ⑩ 신선 데이터
        } catch(e) { console.error('Fetch error:',e); }
        finally {
            overlay.classList.add('fade-out');
            setTimeout(()=>overlay.style.display='none',300);
            render();
        }
    }

    function parseAndSetState(data) {
        AppState.tasks = data.tasks || AppState.tasks;
        AppState.memo = data.memo || "등록된 코멘트가 없습니다.";
        AppState.schedule = data.schedule || [];
        AppState.lastSync = data.lastSync || "—";
        const today = todayStr();
        AppState.schedule.forEach(s => s.isToday = (s.fullDate === today));
    }

    async function syncSilent(restoreY=null) { // ⑤ 백그라운드 싱크
        try {
            const data = await fetch(GAS_URL).then(r=>r.json());
            localStorage.setItem('warehouse_cache_data', JSON.stringify(data));
            parseAndSetState(data);
            document.getElementById('cache-chip').style.display='none';
            render();
            if (restoreY!==null) requestAnimationFrame(()=>window.scrollTo(0,restoreY));
        } catch(e) {}
    }

    function syncForce() { initApp(true); }

    /* ── SORT ⑥ ── */
    function cycleSortMode() {
        _sortIdx = (_sortIdx+1) % SORT_MODES.length;
        document.getElementById('sort-label').innerText = SORT_MODES[_sortIdx].label;
        filterAndRenderList();
    }

    /* ── RENDER ── */
    function render() {
        let total=0, doneTotal=0;
        const today=todayStr();
        for (const cat of CATS) {
            const tasks=AppState.tasks[cat]||[];
            const doneCnt=tasks.filter(t=>t.status==='done').length;
            const activeCnt=tasks.length-doneCnt;
            const overdueCnt=tasks.filter(t=>t.status!=='done'&&t.duedate&&t.duedate<today).length; // ⑫
            total+=tasks.length; doneTotal+=doneCnt;

            const pct=tasks.length>0?Math.round(doneCnt/tasks.length*100):0;
            document.getElementById(`badge-${cat}`).innerText = AppState.onlyArchiveMode?doneCnt:activeCnt;
            document.getElementById(`progress-${cat}`).style.width=`${pct}%`;
            document.getElementById(`status-${cat}`).innerText = tasks.length===0?'Empty':(activeCnt===0?'완료':'Active');

            // ⑫ 기한초과 배지
            const oBadge=document.getElementById(`overdue-${cat}`);
            if(oBadge){oBadge.style.display=overdueCnt>0?'':'none';oBadge.textContent=`D+ ${overdueCnt}`;}

            document.getElementById(`card-${cat}`).classList.toggle('selected',AppState.selectedCategory===cat);
        }
        const pct=total>0?Math.round(doneTotal/total*100):0;
        document.getElementById('ui-progress-percent').innerText=`${pct}%`;
        document.getElementById('nav-total').innerText=total;
        document.getElementById('total-tasks-label').innerText=`(전체 ${total}건)`;
        document.getElementById('nav-sync').innerText=AppState.lastSync;
        document.getElementById('ui-memo').innerText=AppState.memo;
        const circ=43.98;
        document.getElementById('ui-ring-fill').style.strokeDashoffset=circ-(circ*pct/100);

        // Schedule ⑪ todayStr 이미 적용됨
        document.getElementById('ui-schedule').innerHTML=AppState.schedule.map(s=>{
            const cls=['sch-card',s.isToday?'today':'',s.isHoliday?'holiday':''].filter(Boolean).join(' ');
            return `<div class="${cls}"><div class="sch-top"><span class="sch-dayname">${escHtml(s.id||'')}</span>${s.isToday?'<span class="today-badge">TODAY</span>':''}</div><div class="sch-date">${escHtml(s.date||'')}</div>${s.isHoliday?`<div class="holiday-label">${escHtml(s.holiday||'')}</div>`:''}<div class="sch-loc">${escHtml(s.loc||'—')}</div></div>`;
        }).join('');

        filterAndRenderList();
    }

    /* ── LIST ── */
    function filterAndRenderList() {
        const area=document.getElementById('content-area');
        const gq=AppState.globalQuery;
        if (!AppState.selectedCategory && !gq) { area.style.display='none'; return; }
        area.style.display='block';

        const today=todayStr();
        const keyword=(gq||document.getElementById('search-keyword').value.toLowerCase().trim());
        let sourceItems=[];

        if (gq) {
            for (const cat of CATS) (AppState.tasks[cat]||[]).forEach(t=>sourceItems.push({...t,cat}));
            document.getElementById('ui-list-title').innerText=`전체 검색: "${gq}"`;
            document.getElementById('search-keyword').value='';
        } else {
            const cat=AppState.selectedCategory;
            sourceItems=(AppState.tasks[cat]||[]).map(t=>({...t,cat}));
            document.getElementById('ui-list-title').innerText=`${cat}${AppState.onlyArchiveMode?' · 아카이브':''}`;
        }

        let filtered=sourceItems.filter(t=>{
            if (AppState.onlyArchiveMode&&t.status!=='done') return false;
            if (!AppState.onlyArchiveMode&&t.status==='done') return false;
            if (keyword) return (t.title||'').toLowerCase().includes(keyword)||(t.content||'').toLowerCase().includes(keyword);
            return true;
        });

        // ⑥ 정렬
        const mode=SORT_MODES[_sortIdx].key;
        filtered.sort((a,b)=>{
            if (mode==='duedate_asc') return (a.duedate||'9999-99-99').localeCompare(b.duedate||'9999-99-99');
            if (mode==='duedate_desc') return (b.duedate||'').localeCompare(a.duedate||'');
            return (a.date||'').localeCompare(b.date||'');
        });

        if (gq) {
            document.getElementById('ui-list-count').innerText=`${filtered.length}건 검색됨`;
        } else {
            const items=AppState.tasks[AppState.selectedCategory]||[];
            const ac=items.filter(t=>t.status!=='done').length;
            document.getElementById('ui-list-count').innerText=`${ac}건 진행 / ${items.length-ac}건 완료`;
        }

        const listDiv=document.getElementById('ui-post-list');
        if (filtered.length===0) {
            listDiv.innerHTML=`<div class="list-empty"><i class="fa-regular fa-folder-open"></i>${gq?'검색 결과가 없습니다.':(AppState.onlyArchiveMode?'종료 및 보관된 업무가 없습니다.':'현재 진행 중인 업무가 없습니다.')}</div>`;
            return;
        }

        listDiv.innerHTML=filtered.map(t=>{
            const isDone=t.status==='done';
            const isOverdue=!isDone&&t.duedate&&t.duedate<today; // ⑦
            const catBtn=escHtml(t.cat||AppState.selectedCategory);
            const tid=escHtml(t.id);
            const fileHref=safeUrl(t.fileUrl); // ⑨
            return `<div class="list-row${isDone?' done':''}">
                <div class="list-info">
                    ${gq?`<span class="list-cat-tag">${escHtml(t.cat)}</span>`:''}
                    <span class="list-date">${escHtml(t.date)} 등록</span>
                    <span class="list-title">${escHtml(t.title)}</span>
                    ${t.content?`<span class="list-content">${escHtml(t.content)}</span>`:''}
                    ${t.duedate?`<span class="list-duedate${isOverdue?' overdue':''}"><i class="fa-regular fa-clock"></i> 목표일: ${escHtml(t.duedate)}${isOverdue?' · 기한초과':''}</span>`:''}
                    ${fileHref?`<a href="${fileHref}" target="_blank" rel="noopener" class="list-attachment"><i class="fa-solid fa-paperclip"></i> 첨부파일</a>`:''}
                </div>
                <div class="list-actions">
                    <button class="act-btn done-btn${isDone?' active':''}" onclick="toggleDone('${tid}')" title="${isDone?'진행중으로 변경':'완료 처리'}"><i class="fa-solid fa-check"></i></button>
                    <button class="act-btn mod-btn" onclick="openModifyModal('${catBtn}','${tid}')" title="수정"><i class="fa-solid fa-pen"></i></button>
                    <button class="act-btn del-btn" onclick="handleDelete('${catBtn}','${tid}')" title="삭제"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    /* ── SAVE ── */
    async function handleSave() {
        const id=document.getElementById('reg-id').value;
        const title=document.getElementById('reg-title').value.trim();
        // ④ 제목 검증
        if (!title) { alert("제목을 입력하세요."); document.getElementById('reg-title').focus(); return; }
        const pwd=getGlobalPassword(); if(!pwd) return;
        const submitBtn=document.getElementById('btn-save-submit');
        submitBtn.textContent="저장 중…"; submitBtn.disabled=true;
        const payload={
            action:id?'updateTask':'addTask', id:id||Date.now().toString(),
            category:document.getElementById('reg-cat').value,
            date:document.getElementById('reg-startdate').value||todayStr(),
            title, content:document.getElementById('reg-content').value.trim(),
            duedate:document.getElementById('reg-duedate').value,
            password:pwd, fileData:null, fileName:null, fileMime:null
        };
        const fileInput=document.getElementById('reg-file');
        if (fileInput.files&&fileInput.files.length>0) {
            const file=fileInput.files[0];
            // ③ 파일 크기/타입 검증
            if (file.size>25*1024*1024) { alert("파일 크기는 25MB 이하여야 합니다."); submitBtn.textContent='구글시트 저장'; submitBtn.disabled=false; return; }
            const allowed=['image/','application/pdf','application/msword','application/vnd.openxmlformats','application/vnd.ms-','text/','application/zip','application/x-zip'];
            if (!allowed.some(t=>file.type.startsWith(t))) { alert(`허용되지 않는 파일 형식입니다.\n(${file.type})`); submitBtn.textContent='구글시트 저장'; submitBtn.disabled=false; return; }
            const reader=new FileReader();
            reader.onerror=()=>{ alert("파일을 읽는 중 오류가 발생했습니다."); submitBtn.textContent='구글시트 저장'; submitBtn.disabled=false; }; // ③
            reader.onload=async(e)=>{ payload.fileData=e.target.result.split(',')[1]; payload.fileName=file.name; payload.fileMime=file.type; await sendTaskData(payload); };
            reader.readAsDataURL(file);
        } else { await sendTaskData(payload); }
    }

    async function sendTaskData(payload) {
        try {
            const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
            const result=await res.json();
            if(result.status==="auth_error"){alert(result.message);}
            else{localStorage.removeItem('warehouse_cache_data');closeModal();await syncSilent();}
        } catch(e){alert("통신 오류가 발생했습니다.");}
        finally{document.getElementById('btn-save-submit').textContent="구글시트 저장";document.getElementById('btn-save-submit').disabled=false;}
    }

    async function handleMemoSave() {
        const newMemo=document.getElementById('edit-memo-text').value.trim();
        if(!newMemo) return;
        const pwd=getGlobalPassword(); if(!pwd) return;
        try {
            const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'updateMemo',memo:newMemo,password:pwd})});
            const result=await res.json();
            if(result.status==="auth_error"){alert(result.message);}
            else{localStorage.removeItem('warehouse_cache_data');closeMemoModal();await syncSilent();}

    }

    /* ── DELETE ① ── */
    async function handleDelete(cat,id) {
        const pwd=getGlobalPassword(); if(!pwd) return;
        const task=(AppState.tasks[cat]||[]).find(t=>String(t.id)===String(id));
        const label=task?`"${task.title}"를(을)`:'이 업무를';
        if(!confirm(`${label} 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.`)) return; // ①
        // 낙관적 삭제
        AppState.tasks[cat]=(AppState.tasks[cat]||[]).filter(t=>String(t.id)!==String(id));
        render();
        try {
            const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'deleteTask',id,password:pwd})});
            const result=await res.json();
            if(result.status==="auth_error"){alert(result.message);await initApp(true);}
            else{await syncSilent();}
        } catch(e){alert("통신 오류가 발생했습니다.");await initApp(true);}
    }

    /* ── TOGGLE DONE ⑤ ── */
    async function toggleDone(id) {
        const pwd=getGlobalPassword(); if(!pwd) return;
        const scrollY=window.scrollY;
        // 낙관적 업데이트
        for(const cat of CATS){
            const task=(AppState.tasks[cat]||[]).find(t=>String(t.id)===String(id));
            if(task){task.status=task.status==='done'?'active':'done';break;}
        }
        render();
        requestAnimationFrame(()=>window.scrollTo(0,scrollY));
        try {
            const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'toggleStatus',id,password:pwd})});
            const result=await res.json();
            if(result.status==="auth_error"){alert(result.message);await initApp(true);return;}
            await syncSilent(scrollY); // 백그라운드 싱크, 스크롤 복원
        } catch(e){alert("통신 오류가 발생했습니다.");await initApp(true);}
    }

    /* ── KPI ── */
    let kpiTab='monthly';
    function openKpiModal(){document.getElementById('kpiModal').classList.add('active');buildKpiContent();}
    function closeKpiModal(){document.getElementById('kpiModal').classList.remove('active');}
    function switchKpiTab(tab){
        kpiTab=tab;
        document.getElementById('tab-monthly').classList.toggle('active',tab==='monthly');
        document.getElementById('tab-category').classList.toggle('active',tab==='category');
        document.getElementById('kpi-content-monthly').style.display=tab==='monthly'?'':'none';
        document.getElementById('kpi-content-category').style.display=tab==='category'?'':'none';
    }
    function buildKpiContent(){
        let all=[];
        for(const cat of CATS) all=all.concat((AppState.tasks[cat]||[]).map(t=>({...t,cat})));
        const total=all.length, done=all.filter(t=>t.status==='done').length;
        const pct=total>0?Math.round(done/total*100):0;
        document.getElementById('kpi-date-range').innerText=`기준일: ${new Date().toLocaleDateString('ko-KR')} 현재 누계`;
        document.getElementById('kpi-summary-chips').innerHTML=`<div class="kpi-summary-chip"><div class="kpi-chip-label">전체</div><div class="kpi-chip-value">${total}</div></div><div class="kpi-summary-chip"><div class="kpi-chip-label">완료</div><div class="kpi-chip-value green">${done}</div></div><div class="kpi-summary-chip"><div class="kpi-chip-label">진행중</div><div class="kpi-chip-value">${total-done}</div></div><div class="kpi-summary-chip"><div class="kpi-chip-label">달성률</div><div class="kpi-chip-value">${pct}%</div></div>`;
        const mmap={};
        all.forEach(t=>{const m=(t.duedate||t.date||'').substring(0,7);if(!m)return;if(!mmap[m])mmap[m]={done:0,total:0};mmap[m].total++;if(t.status==='done')mmap[m].done++;});
        const months=Object.keys(mmap).sort();
        const maxD=months.length?Math.max(...months.map(m=>mmap[m].done),1):1;
        document.getElementById('kpi-content-monthly').innerHTML=months.length===0?'<div style="text-align:center;color:var(--sys-label-4);padding:24px 0;font-size:13px;">데이터가 없습니다.</div>':`<div class="kpi-month-list">${months.map(m=>{const{done:d,total:tt}=mmap[m];const w=Math.round(d/maxD*100);return`<div class="kpi-month-row"><span class="kpi-month-label">${m}</span><div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${w}%"></div></div><span class="kpi-month-count">${d}/${tt}</span></div>`;}).join('')}</div>`;
        document.getElementById('kpi-content-category').innerHTML=`<table class="kpi-cat-table"><thead><tr><th>분류</th><th>전체</th><th>완료</th><th>진행중</th><th>달성률</th></tr></thead><tbody>${CATS.map(cat=>{const tasks=AppState.tasks[cat]||[];const d=tasks.filter(t=>t.status==='done').length;const tt=tasks.length;const p=tt>0?Math.round(d/tt*100):0;const cls=p>=80?'':p>=40?'mid':'low';return`<tr><td style="font-weight:600;">${cat}</td><td>${tt}</td><td>${d}</td><td>${tt-d}</td><td><span class="kpi-pct-badge ${cls}">${p}%</span></td></tr>`;}).join('')}</tbody></table>`;
    }

    /* ── PRINT ⑭ ── */
    function printReport() {
        const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
        let all=[];
        for(const cat of CATS) all=all.concat((AppState.tasks[cat]||[]).map(t=>({...t,cat})));
        const total=all.length,done=all.filter(t=>t.status==='done').length,pct=total>0?Math.round(done/total*100):0;

        // ⑭ 주간 일정 섹션
        const schSection=AppState.schedule.length>0?`<div class="pv-cat-section"><div class="pv-cat-header"><span class="pv-cat-name">최차장 주간 일정</span></div><div class="pv-sch-grid">${AppState.schedule.map(s=>`<div class="pv-sch-card${s.isToday?' pv-sch-today':''}"><div class="pv-sch-day">${escHtml(s.id||'')}</div><div class="pv-sch-date">${escHtml(s.date||'')}</div><div class="pv-sch-loc">${s.isHoliday?escHtml(s.holiday||''):escHtml(s.loc||'—')}</div></div>`).join('')}</div></div>`:'';

        const catSections=CATS.map(cat=>{
            const active=(AppState.tasks[cat]||[]).filter(t=>t.status!=='done').sort((a,b)=>(a.date||'').localeCompare(b.date||''));
            if(!active.length) return '';
            const rows=active.map(t=>`<div class="pv-task-row"><div class="pv-task-body"><div class="pv-task-title">${escHtml(t.title)}</div>${t.content?`<div class="pv-task-content">${escHtml(t.content)}</div>`:''}</div><div class="pv-task-meta"><span class="pv-task-date">${escHtml(t.date)} 등록</span>${t.duedate?`<span class="pv-task-due">목표: ${escHtml(t.duedate)}</span>`:''}</div></div>`).join('');
            return `<div class="pv-cat-section"><div class="pv-cat-header"><span class="pv-cat-name">${cat}</span><span class="pv-cat-stat">&nbsp;진행중 ${active.length}건</span></div>${rows}</div>`;
        }).join('');

        document.getElementById('print-view').innerHTML=`<div class="pv-header"><div class="pv-title">품질안전보건실 업무 현황 보고</div><div class="pv-meta">작성일: ${today}&nbsp;|&nbsp;담당: 최차장&nbsp;|&nbsp;보고: 정재빈 실장</div></div><div class="pv-summary"><div><div class="pv-summary-label">전체 업무</div><div class="pv-summary-value">${total}건</div></div><div><div class="pv-summary-label">완료</div><div class="pv-summary-value">${done}건</div></div><div><div class="pv-summary-label">진행중</div><div class="pv-summary-value">${total-done}건</div></div><div><div class="pv-summary-label">달성률</div><div class="pv-summary-value">${pct}%</div></div></div>${schSection}${catSections}<div class="pv-footer"><span>품질안전보건실 업무창고 시스템</span><span>출력일시: ${new Date().toLocaleString('ko-KR')}</span></div>`;
        window.print();
    }

    document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeMemoModal();closeKpiModal();}});
    initApp();
</script>
</body>
</html>
